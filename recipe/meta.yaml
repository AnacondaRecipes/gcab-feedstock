{% set name = "gcab" %}
{% set version = "1.6" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/GNOME/{{ name }}/archive/refs/tags/v{{ version }}.zip
  sha256: 042866b6d72006e8332bf278e0b8c50a6235dcce40a2702c56a271cc58535373
  patches:
    - 0001-Explicitly-specify-gir-dir.patch

build:
  number: 0
  # Not supported on win
  skip: true  # [win]
  run_exports:
    - {{ pin_subpackage("gcab") }}

requirements:
  build:
    - {{ stdlib('c') }}
    - {{ compiler('c') }}
    - meson
    - python
    - ninja-base
    - pkg-config
    - setuptools
    - glib {{ glib }}
    - gobject-introspection
  host:
    - glib {{ glib }}
    - zlib {{ zlib }}
    - gettext {{ gettext }}  # [osx]

test:
  commands:
    - test -f $PREFIX/lib/libgcab-1.0${SHLIB_EXT}
    - gcab --version
    - test -f $PREFIX/lib/girepository-1.0/GCab-1.0.typelib
    - test -f $PREFIX/share/gir-1.0/GCab-1.0.gir

about:
  home: https://github.com/GNOME/gcab
  license: LGPL-2.1-or-later
  license_family: LGPL
  license_file:
    - COPYING
  summary: A GObject library to create cabinet files
  description: |
    gcab - Program to create and manage Microsoft cabinet (.cab) archives.
  dev_url: https://github.com/GNOME/gcab
  doc_url: https://github.com/GNOME/gcab

extra:
  recipe-maintainers:
    - isuruf
    - xhochy
    - katietz
